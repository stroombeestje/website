# Netlify configuration for the Jaco Schilp site.
#
# On every deploy, Netlify runs the build command, which stitches the
# per-project files in data/projects/ back into data/projects.json (the
# file the website reads). Then it publishes the whole folder as-is.
#
# This is what lets the back office store one file per project (grouped by
# year, each with its own media folder) while the live site stays no-build.

[build]
  # Rebuild data/projects.json from the per-project files. If Python is
  # unavailable the committed projects.json is already current, so we let
  # the deploy continue rather than fail.
  command = "python3 scripts/build_site_data.py || python scripts/build_site_data.py || echo 'using committed data/projects.json'"
  publish = "."

# Send /admin to the back office (Sveltia CMS) cleanly.
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200
